<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message anonyme</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  min-height: 100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box {
  background:white;
  width:90%;
  max-width:400px;
  padding:25px;
  border-radius:15px;
  text-align:center;
}

textarea {
  width:100%;
  height:120px;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  margin-top:15px;
  width:100%;
  padding:12px;
  background:#1e3c72;
  color:white;
  border:none;
  border-radius:8px;
  font-size:16px;
}

h2 {
  color:#1e3c72;
}

.erreur {
  color:red;
}
</style>
</head>

<body>

<div class="box" id="contenu">
<p>Chargement...</p>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const nom = params.get("nom");
const formCode = params.get("form");
const contenu = document.getElementById("contenu");

if (!nom || !formCode) {
  contenu.innerHTML = "<h2>⚠️ Lien invalide</h2><p>Ce lien de message anonyme est incomplet ou incorrect.</p>";
} else {
  contenu.innerHTML = `
    <h2>📩 Message anonyme</h2>
    <p>Envoyez un message à <b>${nom}</b></p>
    <form action="https://formspree.io/f/${formCode}" method="POST">
      <textarea name="message" placeholder="Écris ton message ici..." required></textarea>
      <button type="submit">Envoyer anonymement</button>
    </form>
  `;
}
</script>

</div>

</body>
</html>
